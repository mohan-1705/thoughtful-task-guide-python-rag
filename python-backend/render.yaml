services:
  - type: web
    name: thoughtful-task-guide-rag-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: LOVABLE_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
